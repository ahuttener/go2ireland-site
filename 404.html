<title>Page not found · Keymate</title>
<meta name="description" content="The page you were looking for doesn't exist. Head back to Keymate to find rooms and roommates in Ireland.">
<link rel="icon" href="https://www.mykeymate.com/logo.png">
<style>
  :root{--card:#FFFFFF;--card-2:#F4F6FA;--ink:#151719;--muted:#5A6472;--line:#E6E9EF;--brand:#2563EB;--brand-deep:#1D4FD0}
  @media (prefers-color-scheme:dark){:root{--card:#171B21;--card-2:#1E232B;--ink:#EAEEF3;--muted:#95A0AF;--line:#2A313B}}
  :root[data-theme="dark"]{--card:#171B21;--card-2:#1E232B;--ink:#EAEEF3;--muted:#95A0AF;--line:#2A313B}
  :root[data-theme="light"]{--card:#FFFFFF;--card-2:#F4F6FA;--ink:#151719;--muted:#5A6472;--line:#E6E9EF}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;
    background:var(--card-2);color:var(--ink);
    font-family:'DM Sans',system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .box{max-width:460px;text-align:center;background:var(--card);border:1px solid var(--line);
    border-radius:20px;padding:44px 32px;box-shadow:0 12px 40px rgba(20,30,60,.06)}
  .logo{font-weight:800;font-size:22px;letter-spacing:-.02em;color:var(--brand);margin-bottom:22px}
  .logo b{color:var(--ink)}
  .code{font-family:Georgia,'Times New Roman',serif;font-size:64px;line-height:1;font-weight:700;margin:0 0 6px}
  h1{font-family:Georgia,'Times New Roman',serif;font-size:24px;font-weight:700;margin:0 0 10px}
  p{color:var(--muted);font-size:15px;line-height:1.5;margin:0 0 26px}
  .btn{display:inline-block;background:var(--brand);color:#fff;text-decoration:none;font-weight:700;
    font-size:15px;padding:12px 22px;border-radius:12px;transition:background .15s}
  .btn:hover{background:var(--brand-deep)}
  .alt{display:block;margin-top:16px;color:var(--brand);text-decoration:none;font-size:14px;font-weight:600}
  .alt:hover{text-decoration:underline}
</style>
</head>
<body>
  <div class="box">
    <div class="logo">K<b>eymate</b></div>
    <p class="code">404</p>
    <h1>This page took a wrong turn</h1>
    <p>The page you were looking for doesn't exist or has moved. Let's get you back to finding a room and the right roommates.</p>
    <a class="btn" href="/index.html">← Back to home</a>
    <a class="alt" href="/browse.html">Or browse rooms in Ireland</a>
  </div>
</body>
</html>
